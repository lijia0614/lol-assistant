<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="120" stroke="#1e293b" stroke-width="4"/>

  <!-- Shield shape -->
  <path d="M128 40L52 72v52c0 48 30 92 76 104 46-12 76-56 76-104V72L128 40z"
        fill="url(#shield)" opacity="0.9"/>

  <!-- Inner shield detail -->
  <path d="M128 56L68 82v42c0 38 24 72 60 82 36-10 60-44 60-82V82L128 56z"
        stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>

  <!-- Letter L (left) -->
  <rect x="86" y="100" width="8" height="56" rx="2" fill="white" opacity="0.9"/>
  <rect x="94" y="148" width="30" height="8" rx="2" fill="white" opacity="0.9"/>

  <!-- Letter A (right) -->
  <path d="M136 100l18 56h-10l-4-14h-16l-4 14h-10l18-56h8zM140 134l-4-14-4 14h8z"
        fill="white" opacity="0.9"/>

  <!-- Red accent slash -->
  <line x1="92" y1="60" x2="140" y2="60" stroke="url(#accent)" stroke-width="4"
        stroke-linecap="round" opacity="0.8"/>

  <!-- Outer ring glow -->
  <circle cx="128" cy="128" r="124" stroke="#4da6ff" stroke-width="1" opacity="0.3"
          stroke-dasharray="8 40" />
</svg>
